<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C.G. Daverio | Home</title>
<meta name="description" content="Sito ufficiale della squadra: news, calendario partite, classifiche e documenti.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/homepage.css">
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="homepage.html" aria-label="Torna alla home">
      <span class="brand-crest">
        <img src="imgs/logo.png" alt="Stemma squadra" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      </span>
    </a>

    <!-- Tabellone data/ora: visibile su mobile -->
    <div class="scoreboard" id="scoreboard" aria-live="off">
      <span class="scoreboard-date" id="scoreboard-date">--/--/----</span>
      <span class="scoreboard-time" id="scoreboard-time">--:--</span>
    </div>

    <!-- Nav orizzontale: visibile da pc -->
    <nav class="top-nav" aria-label="Navigazione principale">
      <a href="homepage.html" class="top-nav-link is-active">Home</a>
      <span class="top-nav-sep" aria-hidden="true">|</span>
      <a href="calendario.html" class="top-nav-link">Calendario</a>
      <span class="top-nav-sep" aria-hidden="true">|</span>
      <a href="classifiche.html" class="top-nav-link">Classifiche</a>
      <span class="top-nav-sep" aria-hidden="true">|</span>
      <a href="documenti.html" class="top-nav-link">Documenti</a>
    </nav>
  </div>
</header>

<!-- CONTENUTO -->
<main class="page">

  <section class="section-block" aria-labelledby="news-heading">
    <div class="section-tag">Ultime</div>
    <h1 id="news-heading" class="section-title">News della squadra</h1>

    <div class="news-list" id="news-list">
      <!-- Le card vengono generate da js/homepage.js -->
      <p class="news-empty" id="news-empty" hidden>Nessuna news al momento. Torna a trovarci presto.</p>
    </div>
  </section>

  <section class="section-block section-block--muted" aria-labelledby="iniziative-heading">
    <div class="section-tag section-tag--gold">In corso</div>
    <h2 id="iniziative-heading" class="section-title">Iniziative</h2>
    <div class="news-list" id="iniziative-list"></div>
  </section>

  <section class="section-block" aria-labelledby="risultati-heading">
    <div class="section-tag section-tag--red">Risultati</div>
    <h2 id="risultati-heading" class="section-title">Ultimi risultati</h2>
    <div class="news-list" id="risultati-list"></div>
  </section>

</main>

<footer class="site-footer">
  <p>&copy; <span id="anno-corrente">2026</span> C.G. Daverio &middot; Tutti i diritti riservati</p>
</footer>

<!-- BOTTOM NAV: fissa, solo mobile -->
<nav class="bottom-nav" aria-label="Navigazione rapida">
  <a href="homepage.html" class="bottom-nav-item is-active">
    <span class="bottom-nav-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>
    </span>
    <span class="bottom-nav-label">Home</span>
  </a>
  <a href="calendario.html" class="bottom-nav-item">
    <span class="bottom-nav-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
    </span>
    <span class="bottom-nav-label">Calendario</span>
  </a>
  <a href="classifiche.html" class="bottom-nav-item">
    <span class="bottom-nav-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21V10M12 21V3M20 21v-7"/></svg>
    </span>
    <span class="bottom-nav-label">Classifiche</span>
  </a>
  <a href="documenti.html" class="bottom-nav-item">
    <span class="bottom-nav-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg>
    </span>
    <span class="bottom-nav-label">Documenti</span>
  </a>
</nav>

<script src="js/homepage.js"></script>
</body>
</html>
