<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario e Risultati | C.G. DAVERIO</title>
<meta name="description" content="Calendario partite e risultati di tutte le squadre della società.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/homepage.css">
<link rel="stylesheet" href="css/calendario.css">
</head>
<body>

<!-- HEADER (identico alla home, nav su "Calendario") -->
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="homepage.html" aria-label="Torna alla home">
      <span class="brand-crest">
        <img src="imgs/logo.png" alt="Stemma squadra" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      </span>
    </a>

    <div class="scoreboard" id="scoreboard" aria-live="off">
      <span class="scoreboard-date" id="scoreboard-date">--/--/----</span>
      <span class="scoreboard-time" id="scoreboard-time">--:--</span>
    </div>

    <nav class="top-nav" aria-label="Navigazione principale">
      <a href="homepage.html" class="top-nav-link">Home</a>
      <span class="top-nav-sep" aria-hidden="true">|</span>
      <a href="calendario.html" class="top-nav-link is-active">Calendario</a>
      <span class="top-nav-sep" aria-hidden="true">|</span>
      <a href="classifiche.html" class="top-nav-link">Classifiche</a>
      <span class="top-nav-sep" aria-hidden="true">|</span>
      <a href="documenti.html" class="top-nav-link">Documenti</a>
    </nav>
  </div>
</header>

<main class="page page--calendario">

  <h1 class="section-title">Calendario e risultati</h1>

  <!-- CONTROLLI: selezione squadra (mobile+pc) e giornata (solo pc) -->
  <div class="calendar-controls">

    <div class="dropdown" id="team-dropdown">
      <button type="button" class="dropdown-btn" id="team-dropdown-btn"
              aria-haspopup="listbox" aria-expanded="false">
        <span id="team-dropdown-label">Carico squadre&hellip;</span>
        <svg class="dropdown-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <ul class="dropdown-list" id="team-dropdown-list" role="listbox" hidden></ul>
    </div>

    <div class="dropdown dropdown--giornata only-desktop" id="giornata-dropdown">
      <button type="button" class="dropdown-btn" id="giornata-dropdown-btn"
              aria-haspopup="listbox" aria-expanded="false">
        <span id="giornata-dropdown-label">Tutte le giornate</span>
        <svg class="dropdown-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <ul class="dropdown-list" id="giornata-dropdown-list" role="listbox" hidden></ul>
    </div>

  </div>

  <!-- ELENCO PARTITE -->
  <div id="matches-container" class="matches-container" aria-live="polite">
    <p class="matches-loading" id="matches-loading">Caricamento partite&hellip;</p>
  </div>

</main>

<footer class="site-footer">
  <p>&copy; <span id="anno-corrente">2026</span> C.G. DAVERIO &middot; Tutti i diritti riservati</p>
</footer>

<nav class="bottom-nav" aria-label="Navigazione rapida">
  <a href="homepage.html" class="bottom-nav-item">
    <span class="bottom-nav-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>

  </a>
  <a href="calendario.html" class="bottom-nav-item is-active">

    </span>
    <span class="bottom-nav-label">Calendario</span>
  </a>
  <a href="classifiche.html" class="bottom-nav-item">
    <span class="bottom-nav-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21V10M12 21V3M20 21v-7"/></svg>
    </span>
    <span class="bottom-nav-label">Classifiche</span>
  </a>
  <a href="documenti.html" class="bottom-nav-item">
    <span class="bottom-nav-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg>
